    <style>
        :root {

            --text-main: #c9d1d9;

            --border-color: #30363d;
        }

        * {

        }

        body {

            margin-bottom: 50px;

            display: inline-block;
            text-decoration: none;
            transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1);

            max-width: 90px;
            margin-bottom: 15px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .logo-link:hover {
            transform: scale(1.08);
        }

        .logo-link:hover img.main-logo {
            box-shadow: 0 12px 32px rgba(88, 166, 255, 0.2);
        }

        /* ── Featured badge ── */
        .featured-badge-container {
            display: flex;
            justify-content: center;
            margin-bottom: 22px;
        }

        .featured-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, rgba(88, 166, 255, 0.08), rgba(88, 166, 255, 0.04));
            border: 1px solid rgba(88, 166, 255, 0.25);
            padding: 7px 22px;
            border-radius: 50px;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--accent-blue);
            letter-spacing: 0.02em;
            cursor: default;
            box-shadow: 0 0 16px rgba(88, 166, 255, 0.08);
            transition: all 0.3s ease;
        }

        .featured-badge svg {
            width: 17px;
            height: 17px;
            color: #34d399;
            stroke-width: 3.5;
            filter: drop-shadow(0 0 3px rgba(52, 211, 153, 0.4));
        }

        .featured-badge:hover {
            background: linear-gradient(135deg, rgba(88, 166, 255, 0.15), rgba(88, 166, 255, 0.08));
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.12);
        }

        /* ── Headings ── */
        h1 {
            margin-top: 10px;
            margin-bottom: 8px;
            color: var(--text-bright);
            font-size: 1.9rem;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.4rem;
            }
        }

        .sub-tagline {
            color: #8b949e;
            font-size: 1.05rem;
            margin-bottom: 28px;
        }

        /* ── Blockquote ── */
        blockquote {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            color: #8b949e;
            text-align: center;
            margin: 20px auto;
            line-height: 1.8;
            max-width: 550px;
            border: none;
            box-shadow:
                0 0 12px rgba(88, 166, 255, 0.08) inset,
                0 0 20px rgba(0, 0, 0, 0.2),
                0 0 60px rgba(88, 166, 255, 0.04);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        blockquote:hover {
            transform: translateY(-2px);
            box-shadow:

                0 5px 25px rgba(0, 0, 0, 0.3),
                0 0 80px rgba(88, 166, 255, 0.07);

            color: var(--accent-blue);
            font-weight: 600;
            text-shadow: 0 0 8px rgba(88, 166, 255, 0.3);
        }

            display: flex;
            gap: 12px;
            height: 50px;
        }

        .download-button {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--accent-blue);
            color: #0d1117 !important;
            padding: 14px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;

            box-shadow: 0 4px 20px rgba(88, 166, 255, 0.3);

        .download-button:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
            box-shadow: 0 10px 30px rgba(88, 166, 255, 0.4);
        }

        /* ── Story ── */
        .story-container {
            max-width: 850px;
            margin: 40px auto;
            padding: 35px;
            background: rgba(22, 27, 34, 0.6);
            border-radius: 16px;

            text-align: left;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .story-container:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(88, 166, 255, 0.15),
                0 0 50px rgba(88, 166, 255, 0.08);
            border-color: rgba(88, 166, 255, 0.3);
        }

        .story-text {
            color: var(--text-bright);
            font-size: 1.15rem;
            font-weight: 500;
            line-height: 1.8;
        }

        .story-link {
            color: var(--accent-blue);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid transparent;
            transition: border-bottom 0.2s;
        }

        .story-link:hover {
            border-bottom: 1px solid var(--accent-blue);
        }

        /* ── h2 ── */
        h2 {
            color: var(--text-bright);
            border-bottom: 1px solid transparent;
            padding-bottom: 12px;
            margin-top: 60px;
        }

        /* ── Features ── */
        .feature-item {
            margin-bottom: 35px;
        }

        .feature-item strong {
            color: var(--accent-blue);
            font-size: 1.2rem;
            display: block;
            margin-bottom: 8px;
        }

        /* ── Gallery ── */
        .gallery-img {
            max-width: 100%;
            border-radius: 12px;
            margin: 25px 0;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border-color);
        }

        /* ── Links ── */
        a.text-link {
            color: var(--accent-blue);
            text-decoration: none;
            transition: opacity 0.2s;
        }

        a.text-link:hover {
            text-decoration: underline;
            opacity: 0.8;
        }

        /* ── HR ── */
        hr {
            border: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(201, 209, 217, 0.15), transparent);
            margin: 50px 0;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 0 20px 80px;
            color: #8b949e;
            font-size: 0.85rem;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .trademark-notice {
            font-size: 0.75rem;
            color: #484f58;
            margin-top: 20px;
            line-height: 1.5;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .os-link {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: var(--accent-blue);
            transition: opacity 0.2s;
            gap: 6px;
        }

        .os-link:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        .github-icon {
            filter: invert(1);
            opacity: 0.9;
        }

        /* ── Lang switcher ── */
        .lang-switcher {
            position: fixed;
            top: 16px;
            right: 16px;
            display: flex;
            gap: 6px;
            z-index: 999;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .lang-btn {
            background: rgba(22, 27, 34, 0.9);
            border: 1px solid var(--border-color);
            color: #8b949e;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(8px);
        }

        .lang-btn:hover,
        .lang-btn.active {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: rgba(88, 166, 255, 0.08);
        }
    </style>
</head>

        // ─────────────────────────────────────────────
        //  Language detection
        // ─────────────────────────────────────────────
        function detectLang() {
            const langs = navigator.languages || [navigator.language || 'en'];
            for (const l of langs) {
                const lower = l.toLowerCase();
                if (lower === 'zh-tw' || lower === 'zh-hk' || lower === 'zh-hant') return 'zh-Hant';
                if (lower.startsWith('zh')) return 'zh-Hans';
                if (lower.startsWith('ja')) return 'ja';
                if (lower.startsWith('en')) return 'en';
            }
            return 'en'; // fallback
        }

        // ─────────────────────────────────────────────
        //  Apply translations
        // ─────────────────────────────────────────────
        let currentLang = detectLang();

        function applyLang(lang) {
            currentLang = lang;
            const strings = i18n[lang] || i18n['en'];

            // Update all [data-i18n] elements
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (strings[key] !== undefined) {
                    el.innerHTML = strings[key];
                }
            });

            // Update <html lang>
            const htmlLangMap = { 'zh-Hans': 'zh-Hans', 'zh-Hant': 'zh-Hant', 'ja': 'ja', 'en': 'en' };
            document.documentElement.lang = htmlLangMap[lang] || 'en';

            // Highlight active button
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('onclick').includes(`'${lang}'`));
            });
        }

        function setLang(lang) {
            applyLang(lang);
            try { localStorage.setItem('mira_lang', lang); } catch (e) { }
        }

        // Init: prefer saved preference, then browser detection
        (function init() {
            let saved = null;
            try { saved = localStorage.getItem('mira_lang'); } catch (e) { }
            applyLang(saved && i18n[saved] ? saved : detectLang());
        })();
    </script>
